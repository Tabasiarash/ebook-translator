name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: Download test fonts
        run: |
          mkdir -p fonts
          curl -sL -o fonts/NotoSans-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/notosans/NotoSans%5Bwdth,wght%5D.ttf" || true
          if [ ! -f fonts/NotoSans-Regular.ttf ] || [ ! -s fonts/NotoSans-Regular.ttf ]; then
            curl -sL -o fonts/NotoSans-Regular.ttf "https://raw.githubusercontent.com/notofonts/noto-fonts/main/hinted/ttf/NotoSans/NotoSans-Regular.ttf" || true
          fi
          ls -la fonts/

      - name: Generate test fixtures
        run: python scripts/generate_test_pdf.py

      - name: Run tests
        run: python -m pytest tests/ -v
